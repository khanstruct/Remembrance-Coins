    <title>The Fancy Scarecrow</title>

<body>

    <h1>The Fancy Scarecrow</h1>

    <div class="crystal">
        <div class="crystal-inner">
            <img src="../images/Fancy Scarecrow.png" alt="The Fancy Scarecrow">

    <div class="memory-text">
        <p>That’s my good hat.</p>
