<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="../style.css">

    <style>
        :root {
            --glow-start: rgba(25, 55, 130, 0.48);
            --glow-end: rgba(205, 215, 225, 0.48);
        }
    </style>

    <title>Hide and Seek</title>
</head>

<body>

    <h1>Hide and Seek</h1>

    <div class="crystal">
        <div class="crystal-inner">
            <img src="../images/Hiding House.png" alt="Hide and Seek">
        </div>
    </div>

    <div class="memory-text">
        <p>My father and I would always play hide and seek throughout the city.</p>
        <p>I always thought this was the perfect hiding place, just beneath the stairs.</p>
        <p>He must have thought so too, because he found me every time.</p>
    </div>

</body>

</html>
