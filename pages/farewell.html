    <title>Our Last Farewell</title>

<body>

    <h1>Our Last Farewell</h1>

    <div class="crystal">
        <div class="crystal-inner">
            <img src="../images/Last Farewell.png" alt="Our Last Farewell">

        <p>I kept waving until the ship disappeared beyond the horizon.</p>
