            --glow-start: rgba(255, 65, 55, 0.48);

        }

    <title>The Long Goodnight</title>
</head>

<body>

    <h1>The Long Goodnight</h1>

    <div class="crystal">
        <div class="crystal-inner">
            <img src="../images/Couple.png" alt="The Long Goodnight">
        </div>
    </div>

    <div class="memory-text">
        <p>We wandered until the lanterns were the only lights left in the city. Neither of us wanted to be the first to say goodnight.</p>
