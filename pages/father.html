<body>

    <h1>Crowned King</h1>

    <div class="crystal">
        <div class="crystal-inner">
            <img src="../images/Sleeping Father.png" alt="Crowned King">

    <div class="memory-text">
        <p>She thought I was asleep as she crowned me &#x27;King of the Fey&#x27;.</p>
