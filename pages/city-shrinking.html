    <title>Losing Ourselves</title>

<body>

    <h1>Losing Ourselves</h1>

    <div class="crystal">
        <div class="crystal-inner">
            <img src="../images/City is Shrinking.png" alt="Losing Ourselves">
        </div>
    </div>

    <div class="memory-text">
        <p>The shadow is growing, and as it does, we remember less.</p>
        <p>This city is shrinking. I&#x27;m sure of it. Soon, we&#x27;ll all be gone.</p>
    </div>
