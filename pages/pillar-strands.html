<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        :root {
            --glow-start: rgba(90, 160, 255, 0.48);
            --glow-end: rgba(205, 215, 225, 0.48);
        }
    </style>

    <title>Connection to the Gods</title>
</head>

<body>

    <h1>Connection to the Gods</h1>

    <div class="crystal">
        <div class="crystal-inner">
            <img src="../images/Pillar Strands.png" alt="Connection to the Gods">
        </div>
    </div>

    <div class="memory-text">
        <p>As I draw nearer to the pillar, I can see their faces.</p>
        <p>As they witness my approach, silver threads manifest, and my connection to the gods is revealed.</p>
    </div>
